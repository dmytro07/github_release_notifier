swagger: '2.0'
info:
  description: 'GitHub Release Notification API that allows users to subscribe to email notifications about new releases of a chosen GitHub repository.'
  version: '1.0.0'
  title: 'GitHub Release Notification API'
basePath: '/api'
tags:
  - name: 'subscription'
    description: 'Subscription management operations'
  - name: 'observability'
    description: 'Metrics and health endpoints (served outside /api basePath)'
schemes:
  - 'http'
  - 'https'
securityDefinitions:
  ApiKeyAuth:
    type: 'apiKey'
    in: 'header'
    name: 'X-API-Key'
    description: 'Optional API key. Required only when API_SECRET_KEY is configured on the server.'
security:
  - ApiKeyAuth: []
x-external-endpoints:
  - method: GET
    path: /metrics
    description: 'Prometheus metrics scrape endpoint. Returns Node.js runtime metrics and HTTP request metrics in Prometheus text format. Served at the root level (not under /api).'
  - method: GET
    path: /api/health
    description: 'Health check endpoint. Returns { status: ok }.'

paths:
  /subscribe:
    post:
      tags:
        - 'subscription'
      summary: 'Subscribe to release notifications'
      description: 'Subscribe an email to receive notifications about new releases of a GitHub repository. The repository is validated via GitHub API.'
      operationId: 'subscribe'
      consumes:
        - 'application/json'
      produces:
        - 'application/json'
      parameters:
        - in: 'body'
          name: 'body'
          description: 'Subscription request'
          required: true
          schema:
            $ref: '#/definitions/SubscribeRequest'
      responses:
        '200':
          description: 'Subscription successful. Confirmation email sent.'
        '400':
          description: 'Invalid input (e.g., invalid repo format)'
        '404':
          description: 'Repository not found on GitHub'
        '401':
          description: 'Missing API key'
        '403':
          description: 'Invalid API key'
        '409':
          description: 'Email already subscribed to this repository'
  /confirm/{token}:
    get:
      tags:
        - 'subscription'
      summary: 'Confirm email subscription'
      description: 'Confirms a subscription using the token sent in the confirmation email.'
      operationId: 'confirmSubscription'
      security: []
      parameters:
        - name: 'token'
          in: 'path'
          description: 'Confirmation token'
          required: true
          type: 'string'
      produces:
        - 'application/json'
      responses:
        '200':
          description: 'Subscription confirmed successfully'
        '400':
          description: 'Invalid token'
        '404':
          description: 'Token not found'
  /unsubscribe/{token}:
    get:
      tags:
        - 'subscription'
      summary: 'Unsubscribe from release notifications'
      description: 'Unsubscribes an email from release notifications using the token sent in emails.'
      operationId: 'unsubscribe'
      security: []
      parameters:
        - name: 'token'
          in: 'path'
          description: 'Unsubscribe token'
          required: true
          type: 'string'
      produces:
        - 'application/json'
      responses:
        '200':
          description: 'Unsubscribed successfully'
        '400':
          description: 'Invalid token'
        '404':
          description: 'Token not found'
  /subscriptions:
    get:
      tags:
        - 'subscription'
      summary: 'Get subscriptions for an email'
      description: 'Returns all active subscriptions for the given email address.'
      operationId: 'getSubscriptions'
      parameters:
        - name: 'email'
          in: 'query'
          description: 'Email address to look up subscriptions for'
          required: true
          type: 'string'
      produces:
        - 'application/json'
      responses:
        '200':
          description: 'Successful operation - list of subscriptions returned'
          schema:
            type: 'array'
            items:
              $ref: '#/definitions/Subscription'
        '400':
          description: 'Invalid email'
        '401':
          description: 'Missing API key'
        '403':
          description: 'Invalid API key'
definitions:
  SubscribeRequest:
    type: 'object'
    required:
      - 'email'
      - 'repo'
    properties:
      email:
        type: 'string'
        description: 'Email address to subscribe'
      repo:
        type: 'string'
        description: 'GitHub repository in owner/repo format (e.g., golang/go)'
  Subscription:
    type: 'object'
    required:
      - 'email'
      - 'repo'
    properties:
      email:
        type: 'string'
        description: 'Email address'
      repo:
        type: 'string'
        description: 'GitHub repository in owner/repo format'
      confirmed:
        type: 'boolean'
        description: 'Whether the subscription is confirmed'
      last_seen_tag:
        type: 'string'
        description: 'Last release tag this subscription was notified about'
